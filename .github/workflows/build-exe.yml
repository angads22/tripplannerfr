name: Build and Release .exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build .exe
        run: npx pkg . --targets node18-win-x64 --output TripPlanner.exe

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v${{ github.run_number }} \
            TripPlanner.exe \
            --title "Build ${{ github.run_number }}" \
            --repo ${{ github.repository }} \
            || gh release upload v${{ github.run_number }} TripPlanner.exe --repo ${{ github.repository }}
