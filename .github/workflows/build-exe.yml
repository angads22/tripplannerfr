name: Build and Release .exe

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Stamp build info
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "{\"build\": ${{ github.run_number }}, \"version\": \"$VERSION\"}" > build-info.json
          cat build-info.json

      - name: Build .exe
        run: npx pkg . --targets node18-win-x64 --no-bytecode --public-packages "*" --public --output TripPlanner.exe

      - name: Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create v${{ github.run_number }} \
            TripPlanner.exe \
            "Go Online (makeitoutthegc.ca).bat" \
            "dist/READ ME FIRST.txt" \
            --title "Trip Planner v$VERSION (build ${{ github.run_number }})" \
            --notes "Automated build ${{ github.run_number }} from main. Download TripPlanner.exe and double-click. In-app updater will pull future builds automatically." \
            --repo ${{ github.repository }}
