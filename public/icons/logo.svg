<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Pitstop">
  <!-- Pitstop mark: a winding road from a start dot up to a destination pin.
       Transparent background so it sits inside the dark header chip. -->
  <!-- the road -->
  <path d="M13 40 C 13 30, 35 30, 35 20" fill="none" stroke="#F4ECDD" stroke-width="5" stroke-linecap="round"/>
  <!-- dashed centre line -->
  <path d="M13 40 C 13 30, 35 30, 35 20" fill="none" stroke="#1C1815" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="1.5 3.2" opacity="0.55"/>
  <!-- start dot -->
  <circle cx="13" cy="40" r="3.4" fill="#F4ECDD"/>
  <!-- destination pin -->
  <path d="M35 7 C 30.6 7, 27 10.6, 27 15 C 27 21, 35 26, 35 26 C 35 26, 43 21, 43 15 C 43 10.6, 39.4 7, 35 7 Z" fill="#E23B26"/>
  <circle cx="35" cy="15" r="3" fill="#F4ECDD"/>
</svg>
