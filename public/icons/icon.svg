<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Pitstop">
  <!-- Maskable app icon: full-bleed warm gradient with the Pitstop road+pin mark
       centered inside the ~80% safe zone so it survives circular masking. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E23B26"/>
      <stop offset="1" stop-color="#C8741C"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <g transform="translate(256 268) scale(7.6) translate(-24 -24)">
    <!-- the road -->
    <path d="M13 40 C 13 30, 35 30, 35 20" fill="none" stroke="#F4ECDD" stroke-width="5" stroke-linecap="round"/>
    <!-- dashed centre line -->
    <path d="M13 40 C 13 30, 35 30, 35 20" fill="none" stroke="#1C1815" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="1.5 3.2" opacity="0.5"/>
    <!-- start dot -->
    <circle cx="13" cy="40" r="3.4" fill="#F4ECDD"/>
    <!-- destination pin -->
    <path d="M35 7 C 30.6 7, 27 10.6, 27 15 C 27 21, 35 26, 35 26 C 35 26, 43 21, 43 15 C 43 10.6, 39.4 7, 35 7 Z" fill="#1C1815"/>
    <circle cx="35" cy="15" r="3" fill="#F4ECDD"/>
  </g>
</svg>
