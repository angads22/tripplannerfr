<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account · Pitstop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/pitstop.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>" />
</head>
<body>
  <div class="bg">
    <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div><div class="blob b4"></div>
  </div>

  <header class="app-header">
    <div class="brand">
      <span class="brand__logo">🚗</span>
      <span><span class="brand__name">Account</span><span class="brand__sub">your settings</span></span>
    </div>
    <div class="header-spacer"></div>
    <a class="btn ghost small" href="/">← Board</a>
    <button class="btn ghost small" id="logoutBtn">Log out</button>
  </header>

  <main class="wrap" style="max-width:560px">

    <div class="sec-label">Your profile</div>
    <div class="panel reveal">
      <div class="panel__body">
        <div class="row" style="border:none">
          <span class="who__avatar" id="avPreview" style="width:54px;height:54px;font-size:20px">?</span>
          <div class="row__main">
            <div class="row__title mono" id="whoUser">@…</div>
            <div class="row__meta">This is how you show up to the crew.</div>
          </div>
        </div>
        <div class="field"><label>Display name</label><input class="input" id="ac-name" /></div>
        <div class="field"><label>Bio (optional)</label><textarea class="input" id="ac-bio" rows="2" placeholder="a line about you"></textarea></div>
        <div class="modal__row" style="margin-top:0">
          <div style="flex:1;min-width:120px">
            <div class="flabel" style="color:var(--muted-light);margin-bottom:6px">Avatar emoji (optional)</div>
            <input class="input" id="ac-emoji" maxlength="4" placeholder="e.g. 🦝" />
          </div>
          <div style="min-width:120px">
            <div class="flabel" style="color:var(--muted-light);margin-bottom:6px">Avatar color</div>
            <input class="input" id="ac-color" type="color" value="#E23B26" style="height:44px;padding:4px" />
          </div>
        </div>
        <div style="margin-top:14px"><button class="btn primary" id="ac-save">Save profile</button></div>
      </div>
    </div>

    <div class="sec-label">Password</div>
    <div class="panel reveal">
      <div class="panel__body">
        <div class="field"><label>Current password</label><input class="input" id="ac-cur" type="password" autocomplete="current-password" /></div>
        <div class="field"><label>New password (6+)</label><input class="input" id="ac-new" type="password" autocomplete="new-password" /></div>
        <button class="btn primary" id="ac-pw">Change password</button>
      </div>
    </div>

    <div class="sec-label">Danger zone</div>
    <div class="panel reveal">
      <div class="panel__body">
        <div class="row" style="border:none">
          <div class="row__main">
            <div class="row__title">Delete your account</div>
            <div class="row__meta">Removes you from every trip and deletes your login. This can't be undone.</div>
          </div>
          <div class="row__actions"><button class="btn danger small" id="ac-del">Delete account</button></div>
        </div>
      </div>
    </div>

  </main>

  <div class="toast" id="toast"></div>
  <script src="/js/account.js"></script>
</body>
</html>
